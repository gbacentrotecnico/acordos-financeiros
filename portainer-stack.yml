version: '3.8'

services:
  app:
    image: gbacentrotecnico/acordos:latest
    environment:
      # A porta que o NodeJS usa dentro do container
      - PORT=3000
      - NODE_ENV=production
      
      # Informações de Segurança (Ajuste ou gere senhas fortes se necessário)
      - ADMIN_EMAIL=admin@gbamecanica.com.br
      - ADMIN_PASS=gbamecanica010203
      - JWT_SECRET=chave_secreta_super_forte_para_producao_gbamecanica_2026
      
      # Banco de Dados
      - DATABASE_URL=postgres://postgres:gbamecanica010203@postgres:5432/acordos
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=gbamecanica010203
      - DB_NAME=acordos
      
      # Integração Evolution API (WhatsApp) - Preencher depois
      - EVOLUTION_API_URL=
      - EVOLUTION_API_TOKEN=
      - EVOLUTION_INSTANCE=

    networks:
      - network_swarm_public
    depends_on:
      - postgres
    deploy:
      mode: replicated
      replicas: 1
      labels:
        # Habilita o Traefik
        - "traefik.enable=true"
        # Rota para o domínio
        - "traefik.http.routers.acordos.rule=Host(`acordos.gbamecanica.com.br`)"
        # Força o uso da rede websecure (HTTPS/443)
        - "traefik.http.routers.acordos.entrypoints=websecure"
        # Utiliza o resolver Let's Encrypt configurado no seu Traefik
        - "traefik.http.routers.acordos.tls.certresolver=letsencryptresolver"
        # Aponta o roteamento do Traefik para a porta 3000 do container Node
        - "traefik.http.services.acordos.loadbalancer.server.port=3000"

  postgres:    
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=gbamecanica010203
      - POSTGRES_DB=acordos
      - TZ=America/Sao_Paulo      
    networks:
      - network_swarm_public    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  network_swarm_public:
    external: true

volumes:
  postgres_data:
